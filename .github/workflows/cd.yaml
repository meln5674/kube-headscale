name: CD

on:
  workflow_dispatch: {}
  push:
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io

  GOPRIVATE: 'github.com/meln5674/*'

jobs:
  cd:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.1'

      - name: 'Install yq'
        uses: dcarbone/install-yq-action@v1

      - name: Instal Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: 'v2.2.2'

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@79abd3f86f79a9d68a23c75a09a9a85889262adf

      - name: Lint
        run: make -j lint

      - name: Test
        run: make -j test GINKGO_ARGS=--flake-attempts=2

      - name: Get Tag
        id: get-tag
        uses: olegtarasov/get-tag@v2.1

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=schedule
            type=ref,event=tag
            type=sha,format=long,prefix=

      - name: Login
        uses: docker/login-action@28218f9b04b4f3f62068d7b6ce6ca5b26e35336c
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        id: push-image
        uses: docker/build-push-action@ac9327eae2b366085ac7f6a2d02df8aa8ead720a
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Push Chart
        env:
          GIT_TAG: '${{ steps.get-tag.outputs.tag }}'
        run: |
          make -j chart IMAGE_TAG=${GIT_TAG}
          make push-chart CHART_VERSION=${GIT_TAG}

      - name: Sign Image and Chart
        if: ${{ github.event_name != 'pull_request' }}
        env:
          COSIGN_EXPERIMENTAL: 'true'
          IMAGE_TAGS: ${{ steps.docker-meta.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          set -o pipefail
          set -x
          chart_tag=$(cat bin/kube-headscale-*.tgz.tag)
          chart_digest=$(cat bin/kube-headscale-*.tgz.digest)
          to_sign=( "${chart_tag}@${chart_digest}" )
          for image_tag in ${IMAGE_TAGS}; do
            to_sign+=( "${image_tag}@${IMAGE_DIGEST}" )
          done
          cosign sign --yes "${to_sign[@]}"

